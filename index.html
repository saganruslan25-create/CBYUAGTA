<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>СБУ/НПУ — База Даних Ukraine GTA</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Unbounded:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0f;
    --surface: #12141a;
    --surface2: #1a1d26;
    --border: #252836;
    --border2: #2e3347;
    --text: #e8eaf0;
    --text2: #8891a8;
    --text3: #555e78;
    --accent: #4f8cff;
    --accent2: #2d5fc4;
    --green: #2ecc71;
    --red: #e74c3c;
    --yellow: #f39c12;
    --purple: #9b59b6;
    --cyan: #1abc9c;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Unbounded', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,140,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,140,255,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,11,15,.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; height: 60px;
  }
  .logo {
    font-family: var(--display); font-size: 13px; font-weight: 800;
    letter-spacing: .05em; color: var(--accent);
    display: flex; align-items: center; gap: 10px;
  }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

  .header-nav { display: flex; gap: 8px; }
  .nav-btn {
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    letter-spacing: .08em; text-transform: uppercase;
    padding: 7px 16px; border-radius: 6px;
    border: 1px solid var(--border2); background: transparent;
    color: var(--text2); cursor: pointer; transition: all .15s;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }
  .nav-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .app { position: relative; z-index: 1; display: flex; height: calc(100vh - 60px); }

  aside {
    width: 260px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header {
    padding: 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-title { font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--text3); }
  .btn-add-cat {
    width: 28px; height: 28px; background: var(--accent); border: none;
    border-radius: 6px; color: #fff; font-size: 18px; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s;
  }
  .btn-add-cat:hover { background: var(--accent2); }

  .cat-list { flex: 1; overflow-y: auto; padding: 8px; }
  .cat-list::-webkit-scrollbar { width: 5px; }
  .cat-list::-webkit-scrollbar-track { background: transparent; }
  .cat-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  .cat-list::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  .cat-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px; cursor: pointer;
    transition: background .15s; border: 1px solid transparent; margin-bottom: 2px;
  }
  .cat-item:hover { background: var(--surface2); border-color: var(--border2); }
  .cat-item.active { background: rgba(79,140,255,.1); border-color: rgba(79,140,255,.3); }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cat-name { font-size: 12px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cat-count {
    font-size: 10px; background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text3); padding: 2px 7px; border-radius: 20px; min-width: 22px; text-align: center;
  }
  .cat-actions { display: flex; gap: 3px; opacity: 0; transition: opacity .15s; }
  .cat-item:hover .cat-actions { opacity: 1; }
  .cat-icon-btn {
    background: none; border: none; cursor: pointer; font-size: 12px;
    padding: 3px 5px; border-radius: 4px; line-height: 1; transition: all .15s;
  }
  .cat-edit-btn { color: var(--accent); }
  .cat-edit-btn:hover { background: rgba(79,140,255,.15); }
  .cat-del-btn { color: var(--red); }
  .cat-del-btn:hover { background: rgba(231,76,60,.15); }

  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  .toolbar {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center;
  }
  .search-wrap { flex: 1; position: relative; }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text3); font-size: 14px; pointer-events: none;
  }
  .search-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 8px; padding: 9px 12px 9px 36px;
    font-family: var(--mono); font-size: 12px; color: var(--text);
    outline: none; transition: border-color .15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }

  .filter-select {
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 8px; padding: 9px 12px; font-family: var(--mono);
    font-size: 11px; color: var(--text2); outline: none; cursor: pointer; min-width: 130px;
  }
  .filter-select:focus { border-color: var(--accent); }

  .btn-add-item {
    background: var(--accent); border: none; border-radius: 8px; padding: 9px 18px;
    font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: .06em;
    color: #fff; cursor: pointer; white-space: nowrap; transition: background .15s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-add-item:hover { background: var(--accent2); }
  .btn-add-item:disabled { opacity: .4; cursor: not-allowed; }

  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px; color: var(--text3);
  }
  .empty-icon { font-size: 48px; opacity: .3; }
  .empty-title { font-family: var(--display); font-size: 13px; font-weight: 600; color: var(--text2); }
  .empty-sub { font-size: 11px; text-align: center; max-width: 240px; line-height: 1.6; }

  .items-list { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; min-height: 0; overscroll-behavior: contain; }
  .items-list::-webkit-scrollbar { width: 6px; }
  .items-list::-webkit-scrollbar-track { background: var(--surface); }
  .items-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  .items-list::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  .item-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 18px;
    transition: border-color .15s; position: relative; overflow: clip;
    flex-shrink: 0;
  }
  .item-card:hover { border-color: var(--border2); }

  .card-top {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 12px; margin-bottom: 10px;
  }
  .card-title { font-size: 13px; font-weight: 700; line-height: 1.4; flex: 1; }
  .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .card-btn {
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 6px; padding: 5px 10px; font-family: var(--mono);
    font-size: 10px; font-weight: 600; cursor: pointer; transition: all .15s;
    display: flex; align-items: center; gap: 4px; color: var(--text2);
  }
  .card-btn:hover { background: var(--border); color: var(--text); }
  .card-btn.copy-btn:hover { background: rgba(46,204,113,.15); border-color: var(--green); color: var(--green); }
  .card-btn.edit-btn:hover { background: rgba(79,140,255,.15); border-color: var(--accent); color: var(--accent); }
  .card-btn.del-btn:hover { background: rgba(231,76,60,.15); border-color: var(--red); color: var(--red); }

  .card-text { font-size: 11px; color: var(--text2); line-height: 1.7; margin-bottom: 12px; white-space: pre-wrap; }
  .card-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .badge {
    font-size: 10px; font-weight: 600; letter-spacing: .06em;
    padding: 3px 10px; border-radius: 20px; border: 1px solid; text-transform: uppercase;
  }
  .badge-ув { background: rgba(155,89,182,.12); border-color: rgba(155,89,182,.4); color: var(--purple); }
  .badge-штраф { background: rgba(243,156,18,.12); border-color: rgba(243,156,18,.4); color: var(--yellow); }
  .badge-розыск { background: rgba(231,76,60,.12); border-color: rgba(231,76,60,.4); color: var(--red); }
  .badge-default { background: rgba(79,140,255,.12); border-color: rgba(79,140,255,.4); color: var(--accent); }

  .punishment-tag { font-size: 10px; color: var(--text3); display: flex; align-items: center; gap: 4px; }

  .card-cat-badge {
    margin-left: auto; font-size: 9px; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; padding: 2px 8px; border-radius: 20px;
    background: var(--surface2); border: 1px solid var(--border2); color: var(--text3);
  }

  /* MODALS */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    backdrop-filter: blur(6px); z-index: 500;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 16px; width: 100%; max-width: 520px; max-height: 90vh;
    overflow-y: auto; transform: translateY(20px); transition: transform .2s;
    /* FIX: prevent mouse-drag-outside from closing modal */
    pointer-events: all;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-family: var(--display); font-size: 13px; font-weight: 800; letter-spacing: .05em; }
  .modal-close {
    background: none; border: none; color: var(--text3); font-size: 20px;
    cursor: pointer; line-height: 1; padding: 4px; border-radius: 4px; transition: color .15s;
  }
  .modal-close:hover { color: var(--text); }

  .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
  .modal-footer { padding: 16px 24px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); }
  .form-input, .form-textarea, .form-select {
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 8px; padding: 10px 14px; font-family: var(--mono);
    font-size: 12px; color: var(--text); outline: none; transition: border-color .15s; width: 100%;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
  .form-input::placeholder, .form-textarea::placeholder { color: var(--text3); }
  .form-textarea { resize: vertical; min-height: 100px; line-height: 1.6; }

  .color-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-opt {
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent;
    cursor: pointer; transition: transform .1s, border-color .15s;
  }
  .color-opt:hover { transform: scale(1.15); }
  .color-opt.selected { border-color: #fff; transform: scale(1.1); }

  .action-row { display: flex; gap: 8px; }
  .action-opt {
    flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border2);
    background: var(--surface2); cursor: pointer; font-family: var(--mono);
    font-size: 10px; font-weight: 600; letter-spacing: .06em;
    text-align: center; text-transform: uppercase; color: var(--text2); transition: all .15s;
  }
  .action-opt:hover { border-color: var(--border); color: var(--text); }
  .action-opt.selected-уязнення { background: rgba(155,89,182,.15); border-color: var(--purple); color: var(--purple); }
  .action-opt.selected-штраф { background: rgba(243,156,18,.15); border-color: var(--yellow); color: var(--yellow); }
  .action-opt.selected-розыск { background: rgba(231,76,60,.15); border-color: var(--red); color: var(--red); }

  .btn-primary {
    background: var(--accent); border: none; border-radius: 8px; padding: 10px 22px;
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    letter-spacing: .08em; color: #fff; cursor: pointer; transition: background .15s;
  }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary {
    background: transparent; border: 1px solid var(--border2); border-radius: 8px;
    padding: 10px 18px; font-family: var(--mono); font-size: 11px;
    color: var(--text2); cursor: pointer; transition: all .15s;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--text); }

  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    background: var(--surface2); border: 1px solid var(--green);
    border-radius: 10px; padding: 12px 18px; font-size: 11px; font-weight: 600;
    color: var(--green); display: flex; align-items: center; gap: 8px;
    transform: translateY(80px); opacity: 0; transition: all .25s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  .loader { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-bar {
    padding: 8px 20px; border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; font-size: 10px; color: var(--text3);
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 3s infinite; }

  .view-banner {
    padding: 12px 20px; background: rgba(79,140,255,.06);
    border-bottom: 1px solid rgba(79,140,255,.15); font-size: 11px;
    color: var(--accent); font-weight: 600; letter-spacing: .05em;
    display: flex; align-items: center; gap: 8px;
  }

  .highlight { background: rgba(79,140,255,.2); border-radius: 2px; padding: 0 2px; }

  .modal-overlay.open .modal { pointer-events: all; }

  /* Scroll fix: cards must not block scroll events reaching the list */
  .item-card { touch-action: pan-y; }
  .items-list { scroll-behavior: smooth; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    СБУ/НПУ
    <span style="color:var(--text3);font-weight:400;font-size:10px;">// Ukraine GTA База Даних</span>
  </div>
  <div class="header-nav">
    <button class="nav-btn active" onclick="setView('all')" id="nav-all">ВСЕ</button>
    <button class="nav-btn" onclick="setView('cat')" id="nav-cat">КАТЕГОРІЯ</button>
  </div>
</header>

<div class="app">
  <aside>
    <div class="sidebar-header">
      <span class="sidebar-title">Категорії</span>
      <button class="btn-add-cat" onclick="openCatModal()" title="Нова категорія">+</button>
    </div>
    <div class="cat-list" id="catList">
      <div style="padding:20px;text-align:center;color:var(--text3);font-size:11px;">
        <div class="loader"></div>
        <div style="margin-top:8px;">Завантаження...</div>
      </div>
    </div>
  </aside>

  <main>
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" id="searchInput" placeholder="Пошук по ключовим словам..." oninput="handleSearch()">
      </div>
      <select class="filter-select" id="actionFilter" onchange="handleSearch()">
        <option value="">Всі дії</option>
        <option value="уязнення">Ув'язнення</option>
        <option value="штраф">Штраф</option>
        <option value="розыск">Розшук</option>
      </select>
      <button class="btn-add-item" id="addItemBtn" onclick="openItemModal()" disabled>
        + Додати пункт
      </button>
    </div>

    <div id="viewBanner" class="view-banner" style="display:none">
      📋 Показано всі пункти з усіх категорій
    </div>

    <div class="items-list" id="itemsList">
      <div class="empty-state">
        <div class="empty-icon">🗂</div>
        <div class="empty-title">Оберіть категорію</div>
        <div class="empty-sub">Виберіть категорію зліва або переключіться в режим «Все»</div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-dot"></div>
      <span id="statusText">Firebase з'єднано</span>
      <span style="margin-left:auto;" id="countText"></span>
    </div>
  </main>
</div>

<div class="toast" id="toast">✓ <span id="toastMsg">Скопійовано!</span></div>

<!-- MODAL: КАТЕГОРІЯ -->
<div class="modal-overlay" id="catModal">
  <div class="modal" id="catModalBox">
    <div class="modal-header">
      <span class="modal-title" id="catModalTitle">НОВА КАТЕГОРІЯ</span>
      <button class="modal-close" onclick="closeCatModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Назва категорії</label>
        <input class="form-input" id="catName" placeholder="напр. Штрафи ПДР, Розшук, Статті...">
      </div>
      <div class="form-group">
        <label class="form-label">Колір</label>
        <div class="color-row" id="colorRow">
          <div class="color-opt selected" data-color="#4f8cff" style="background:#4f8cff" onclick="selectColor(this)"></div>
          <div class="color-opt" data-color="#2ecc71" style="background:#2ecc71" onclick="selectColor(this)"></div>
          <div class="color-opt" data-color="#e74c3c" style="background:#e74c3c" onclick="selectColor(this)"></div>
          <div class="color-opt" data-color="#f39c12" style="background:#f39c12" onclick="selectColor(this)"></div>
          <div class="color-opt" data-color="#9b59b6" style="background:#9b59b6" onclick="selectColor(this)"></div>
          <div class="color-opt" data-color="#1abc9c" style="background:#1abc9c" onclick="selectColor(this)"></div>
          <div class="color-opt" data-color="#e67e22" style="background:#e67e22" onclick="selectColor(this)"></div>
          <div class="color-opt" data-color="#e91e63" style="background:#e91e63" onclick="selectColor(this)"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeCatModal()">Скасувати</button>
      <button class="btn-primary" onclick="saveCategory()">Зберегти</button>
    </div>
  </div>
</div>

<!-- MODAL: ПУНКТ -->
<div class="modal-overlay" id="itemModal">
  <div class="modal" id="itemModalBox">
    <div class="modal-header">
      <span class="modal-title" id="itemModalTitle">НОВИЙ ПУНКТ</span>
      <button class="modal-close" onclick="closeItemModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Назва / Стаття</label>
        <input class="form-input" id="itemTitle" placeholder="напр. Ст. 125 — Порушення ПДР">
      </div>
      <div class="form-group">
        <label class="form-label">Текст статті</label>
        <textarea class="form-textarea" id="itemText" placeholder="Повний текст статті або опис..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Покарання</label>
        <input class="form-input" id="itemPunishment" placeholder="напр. 5 000 — 15 000 грн або 3 роки позбавлення волі">
      </div>
      <div class="form-group">
        <label class="form-label">Вид дії</label>
        <div class="action-row">
          <button class="action-opt" data-action="уязнення" onclick="selectAction(this)">Ув'язнення</button>
          <button class="action-opt" data-action="штраф" onclick="selectAction(this)">Штраф</button>
          <button class="action-opt" data-action="розыск" onclick="selectAction(this)">Розшук</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Категорія</label>
        <select class="form-select" id="itemCategory"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeItemModal()">Скасувати</button>
      <button class="btn-primary" onclick="saveItem()">Зберегти</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, updateDoc, deleteDoc,
  doc, query, where, onSnapshot, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC3NZSxr5WqcEsIw1dBx6y840oX4i7iFXQ",
  authDomain: "cbyuagta.firebaseapp.com",
  projectId: "cbyuagta",
  storageBucket: "cbyuagta.firebasestorage.app",
  messagingSenderId: "40463825827",
  appId: "1:40463825827:web:a82b540cfa8ebc3d553816"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── STATE ──
let categories = [];
let items = [];
let activeCatId = null;
let currentView = 'cat';
let selectedColor = '#4f8cff';
let selectedAction = null;
let editingItemId = null;
let editingCatId = null;

// ── UTILS ──
function showToast(msg, color = 'var(--green)') {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.style.borderColor = color;
  t.style.color = color;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

function getActionBadgeClass(a) {
  if (a === 'уязнення') return 'badge-ув';
  if (a === 'штраф') return 'badge-штраф';
  if (a === 'розыск') return 'badge-розыск';
  return 'badge-default';
}
function getActionLabel(a) {
  if (a === 'уязнення') return "Ув'язнення";
  if (a === 'штраф') return 'Штраф';
  if (a === 'розыск') return 'Розшук';
  return a || '—';
}
function getCardAccent(a) {
  if (a === 'уязнення') return 'var(--purple)';
  if (a === 'штраф') return 'var(--yellow)';
  if (a === 'розыск') return 'var(--red)';
  return 'var(--accent)';
}
function highlight(text, q) {
  if (!q) return text;
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${esc})`, 'gi'), '<span class="highlight">$1</span>');
}

// ── MODAL CLOSE BUG FIX ──
// Track if mousedown started on the overlay (not the modal box)
// Only close if both mousedown AND mouseup were on the overlay itself
function setupModalCloseFix(overlayId, closeFn) {
  const overlay = document.getElementById(overlayId);
  let mousedownOnOverlay = false;

  overlay.addEventListener('mousedown', function(e) {
    mousedownOnOverlay = (e.target === overlay);
  });
  overlay.addEventListener('mouseup', function(e) {
    if (mousedownOnOverlay && e.target === overlay) {
      closeFn();
    }
    mousedownOnOverlay = false;
  });
}

// ── VIEW ──
window.setView = function(v) {
  currentView = v;
  document.getElementById('nav-all').classList.toggle('active', v === 'all');
  document.getElementById('nav-cat').classList.toggle('active', v === 'cat');
  document.getElementById('viewBanner').style.display = v === 'all' ? 'flex' : 'none';
  document.getElementById('addItemBtn').disabled = (v === 'cat' && !activeCatId);
  renderItems();
};

// ── CATEGORIES ──
function loadCategories() {
  onSnapshot(collection(db, 'categories'), snap => {
    categories = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderCatList();
    renderItems(); // refresh item cat badges
  });
}

function renderCatList() {
  const list = document.getElementById('catList');
  if (categories.length === 0) {
    list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text3);font-size:11px;line-height:1.8">
      Категорій ще немає.<br>Натисніть «+» щоб створити.
    </div>`;
    return;
  }
  list.innerHTML = categories.map(cat => {
    const count = items.filter(i => i.categoryId === cat.id).length;
    return `<div class="cat-item ${activeCatId === cat.id ? 'active' : ''}" onclick="selectCat('${cat.id}')">
      <div class="cat-dot" style="background:${cat.color || '#4f8cff'}"></div>
      <span class="cat-name">${escHtml(cat.name)}</span>
      <span class="cat-count">${count}</span>
      <div class="cat-actions">
        <button class="cat-icon-btn cat-edit-btn" onclick="editCategory(event,'${cat.id}')" title="Редагувати">✎</button>
        <button class="cat-icon-btn cat-del-btn" onclick="deleteCategory(event,'${cat.id}')" title="Видалити">✕</button>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.selectCat = function(id) {
  activeCatId = id;
  currentView = 'cat';
  document.getElementById('nav-all').classList.remove('active');
  document.getElementById('nav-cat').classList.add('active');
  document.getElementById('viewBanner').style.display = 'none';
  document.getElementById('addItemBtn').disabled = false;
  renderCatList();
  renderItems();
};

window.openCatModal = function(catId = null) {
  editingCatId = catId;
  const cat = catId ? categories.find(c => c.id === catId) : null;
  document.getElementById('catModalTitle').textContent = cat ? 'РЕДАГУВАТИ КАТЕГОРІЮ' : 'НОВА КАТЕГОРІЯ';
  document.getElementById('catName').value = cat ? cat.name : '';
  const color = cat ? (cat.color || '#4f8cff') : '#4f8cff';
  selectedColor = color;
  document.querySelectorAll('.color-opt').forEach(el => {
    el.classList.toggle('selected', el.dataset.color === color);
  });
  document.getElementById('catModal').classList.add('open');
  setTimeout(() => document.getElementById('catName').focus(), 200);
};
window.closeCatModal = function() {
  document.getElementById('catModal').classList.remove('open');
  editingCatId = null;
};

window.editCategory = function(e, id) {
  e.stopPropagation();
  openCatModal(id);
};

window.selectColor = function(el) {
  document.querySelectorAll('.color-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedColor = el.dataset.color;
};

window.saveCategory = async function() {
  const name = document.getElementById('catName').value.trim();
  if (!name) { document.getElementById('catName').focus(); return; }
  try {
    if (editingCatId) {
      await updateDoc(doc(db, 'categories', editingCatId), { name, color: selectedColor });
      showToast('Категорію оновлено!');
    } else {
      await addDoc(collection(db, 'categories'), { name, color: selectedColor, createdAt: Date.now() });
      showToast('Категорію створено!');
    }
    closeCatModal();
  } catch(e) {
    showToast('Помилка: ' + e.message, 'var(--red)');
  }
};

window.deleteCategory = async function(e, id) {
  e.stopPropagation();
  if (!confirm('Видалити категорію? Всі пункти всередині також будуть видалені.')) return;
  const snap = await getDocs(query(collection(db, 'items'), where('categoryId', '==', id)));
  for (const d of snap.docs) await deleteDoc(doc(db, 'items', d.id));
  await deleteDoc(doc(db, 'categories', id));
  if (activeCatId === id) { activeCatId = null; document.getElementById('addItemBtn').disabled = true; }
  showToast('Категорію видалено', 'var(--red)');
};

// ── ITEMS ──
function loadItems() {
  onSnapshot(collection(db, 'items'), snap => {
    items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderCatList();
    renderItems();
  });
}

function renderItems() {
  const list = document.getElementById('itemsList');
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const actionF = document.getElementById('actionFilter').value;

  let filtered = [...items];

  if (currentView === 'cat') {
    if (!activeCatId) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">🗂</div>
        <div class="empty-title">Оберіть категорію</div>
        <div class="empty-sub">Виберіть категорію зліва або переключіться в режим «Все»</div>
      </div>`;
      document.getElementById('countText').textContent = '';
      return;
    }
    filtered = filtered.filter(i => i.categoryId === activeCatId);
  }

  if (search) {
    filtered = filtered.filter(i =>
      (i.title||'').toLowerCase().includes(search) ||
      (i.text||'').toLowerCase().includes(search) ||
      (i.punishment||'').toLowerCase().includes(search)
    );
  }
  if (actionF) filtered = filtered.filter(i => i.action === actionF);

  // sort by creation time desc
  filtered.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));

  document.getElementById('countText').textContent = `${filtered.length} пункт(ів)`;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">Нічого не знайдено</div>
      <div class="empty-sub">${search ? 'Спробуйте змінити пошуковий запит' : 'Додайте перший пункт у цю категорію'}</div>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(item => {
    const itemCat = categories.find(c => c.id === item.categoryId);
    const cardAccent = getCardAccent(item.action);
    const badgeClass = getActionBadgeClass(item.action);
    const hl = t => highlight(escHtml(t || ''), search);

    return `<div class="item-card">
      <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${cardAccent};border-radius:12px 0 0 12px"></div>
      <div class="card-top">
        <div class="card-title">${hl(item.title || 'Без назви')}</div>
        <div class="card-actions">
          <button class="card-btn copy-btn" onclick="copyItem('${item.id}')" title="Скопіювати текст статті">⎘ Копія</button>
          <button class="card-btn edit-btn" onclick="openItemModal('${item.id}')" title="Редагувати">✎ Ред.</button>
          <button class="card-btn del-btn" onclick="deleteItem('${item.id}')" title="Видалити">✕</button>
        </div>
      </div>
      ${item.text ? `<div class="card-text">${hl(item.text)}</div>` : ''}
      <div class="card-meta">
        ${item.action ? `<span class="badge ${badgeClass}">${getActionLabel(item.action)}</span>` : ''}
        ${item.punishment ? `<span class="punishment-tag">⚖ ${hl(item.punishment)}</span>` : ''}
        ${currentView === 'all' && itemCat ? `<span class="card-cat-badge" style="color:${itemCat.color||'var(--text3)'}">${escHtml(itemCat.name)}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

window.handleSearch = renderItems;

// ── COPY — тільки назва + текст статті ──
window.copyItem = function(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const parts = [];
  if (item.title) parts.push(item.title);
  if (item.text) parts.push(item.text);
  navigator.clipboard.writeText(parts.join('\n\n').trim()).then(() => {
    showToast('Статтю скопійовано!');
  });
};

window.deleteItem = async function(id) {
  if (!confirm('Видалити цей пункт?')) return;
  await deleteDoc(doc(db, 'items', id));
  showToast('Пункт видалено', 'var(--red)');
};

// ── ITEM MODAL — create & edit ──
window.openItemModal = function(itemId = null) {
  if (currentView === 'cat' && !activeCatId && !itemId) return;
  editingItemId = itemId;
  const item = itemId ? items.find(i => i.id === itemId) : null;

  document.getElementById('itemModalTitle').textContent = item ? 'РЕДАГУВАТИ ПУНКТ' : 'НОВИЙ ПУНКТ';
  document.getElementById('itemTitle').value = item ? (item.title || '') : '';
  document.getElementById('itemText').value = item ? (item.text || '') : '';
  document.getElementById('itemPunishment').value = item ? (item.punishment || '') : '';

  selectedAction = item ? (item.action || null) : null;
  document.querySelectorAll('.action-opt').forEach(b => {
    b.className = 'action-opt';
    if (selectedAction && b.dataset.action === selectedAction) {
      b.classList.add(`selected-${selectedAction}`);
    }
  });

  // fill category select
  const catId = item ? item.categoryId : activeCatId;
  const sel = document.getElementById('itemCategory');
  sel.innerHTML = categories.map(c =>
    `<option value="${c.id}" ${c.id === catId ? 'selected' : ''}>${escHtml(c.name)}</option>`
  ).join('');

  document.getElementById('itemModal').classList.add('open');
  setTimeout(() => document.getElementById('itemTitle').focus(), 200);
};

window.closeItemModal = function() {
  document.getElementById('itemModal').classList.remove('open');
  editingItemId = null;
};

window.selectAction = function(el) {
  // toggle: click same again = deselect
  if (selectedAction === el.dataset.action) {
    selectedAction = null;
    document.querySelectorAll('.action-opt').forEach(b => b.className = 'action-opt');
    return;
  }
  document.querySelectorAll('.action-opt').forEach(b => b.className = 'action-opt');
  selectedAction = el.dataset.action;
  el.classList.add(`selected-${selectedAction}`);
};

window.saveItem = async function() {
  const title = document.getElementById('itemTitle').value.trim();
  const text = document.getElementById('itemText').value.trim();
  const punishment = document.getElementById('itemPunishment').value.trim();
  const categoryId = document.getElementById('itemCategory').value;
  if (!title) { document.getElementById('itemTitle').focus(); return; }
  if (!categoryId) { showToast('Оберіть категорію', 'var(--yellow)'); return; }

  const data = { title, text, punishment, action: selectedAction || null, categoryId };

  try {
    if (editingItemId) {
      await updateDoc(doc(db, 'items', editingItemId), data);
      showToast('Пункт оновлено!');
    } else {
      await addDoc(collection(db, 'items'), { ...data, createdAt: Date.now() });
      showToast('Пункт збережено!');
    }
    closeItemModal();
  } catch(e) {
    showToast('Помилка: ' + e.message, 'var(--red)');
  }
};

// ── INIT ──
document.getElementById('statusText').textContent = "Firebase з'єднано ✓";

// Real-time listeners (onSnapshot already handles real-time updates)
loadCategories();
loadItems();

// Modal close fix: only close when mousedown AND mouseup are on the overlay backdrop
setupModalCloseFix('catModal', closeCatModal);
setupModalCloseFix('itemModal', closeItemModal);


// Scroll fix: ensure wheel events on cards are forwarded to the list
(function() {
  const list = document.getElementById('itemsList');
  list.addEventListener('wheel', function(e) { /* native, already works */ }, { passive: true });
  
  // Delegate: if wheel fires on a card child, manually scroll the list
  document.addEventListener('wheel', function(e) {
    const card = e.target.closest && e.target.closest('.item-card');
    if (card) {
      e.preventDefault();
      list.scrollBy({ top: e.deltaY, behavior: 'auto' });
    }
  }, { passive: false });
})();

// Keyboard ESC
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeCatModal(); closeItemModal(); }
});
// Enter in cat name input
document.getElementById('catName').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveCategory();
});
</script>
